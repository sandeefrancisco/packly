name: Apply Supabase RLS Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply RLS migration via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Sending migration to Supabase project ldxvvqrxqcewygdnotpz..."
          RESPONSE=$(jq -Rs '{"query": .}' supabase-rls-migration.sql \
            | curl -s -w "\n__HTTP_STATUS__%{http_code}" -X POST \
                "https://api.supabase.com/v1/projects/ldxvvqrxqcewygdnotpz/database/query" \
                -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                -d @-)

          HTTP_STATUS=$(echo "$RESPONSE" | grep "__HTTP_STATUS__" | sed 's/__HTTP_STATUS__//')
          BODY=$(echo "$RESPONSE" | grep -v "__HTTP_STATUS__")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Migration failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Migration applied successfully!"
